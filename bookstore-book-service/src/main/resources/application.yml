server:
  port: 8002

spring:
  application:
    name: book-service
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.128:3306/bookstore_book?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: YOUR_PASSWORD
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: YOUR_PASSWORD
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YOUR_JWT_SECRET
  access-token-ttl: 2h
  refresh-token-ttl: 7d

bookstore:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: nanvhaiduiwoshuo
    access-key-id: YOUR_ACCESS_KEY_ID
    access-key-secret: YOUR_ACCESS_KEY_SECRET
    sts-role-arn: ${OSS_STS_ROLE_ARN:acs:ram::1234567890123456:role/your-oss-role}
    sts-duration-seconds: 3600
    public-prefix: https://nanvhaiduiwoshuo.oss-cn-beijing.aliyuncs.com/
    avatar-dir: avatars/
    book-cover-dir: covers/
    review-image-dir: reviews/
    book-cover-source-dir: D:/projects/书本图片

logging:
  level:
    com.bookstore: debug