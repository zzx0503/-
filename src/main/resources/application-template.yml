# 服务器配置
server:
  port: 8080  # 应用监听端口

# Spring 框架配置
spring:
  application:
    name: bookstore  # 应用名称

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL 驱动
    url: jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai  # 数据库连接地址
    username: root  # 数据库用户名
    password: YOUR_DB_PASSWORD  # 数据库密码（请替换为实际密码）

  # Flyway 数据库迁移工具配置
  flyway:
    enabled: true  # 启用 Flyway
    locations: classpath:db/migration  # 迁移脚本位置
    baseline-on-migrate: true  # 自动创建基线
    out-of-order: true  # 允许乱序执行迁移脚本
    validate-on-migrate: false  # 关闭迁移校验（避免表已存在时报错）

  # Redis 缓存配置
  data:
    redis:
      host: 192.168.100.128  # Redis 服务器地址
      port: 6379  # Redis 端口
      password: YOUR_REDIS_PASSWORD  # Redis 密码（请替换为实际密码）
      timeout: 3s  # 连接超时时间
      lettuce:
        pool:
          max-active: 16  # 连接池最大活跃连接数
          max-idle: 8  # 连接池最大空闲连接数

# MyBatis-Plus ORM 框架配置
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1  # 逻辑删除值
      logic-not-delete-value: 0  # 逻辑未删除值

# JWT Token 配置
jwt:
  secret: YOUR_JWT_SECRET  # JWT 签名密钥（请替换为随机字符串，长度不少于32位）
  access-token-ttl: 2h  # Access Token 有效期
  refresh-token-ttl: 7d  # Refresh Token 有效期

# 书店业务配置
bookstore:
  # 阿里云 OSS 对象存储配置
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com  # OSS 服务端点
    bucket: YOUR_OSS_BUCKET  # OSS Bucket 名称（请替换）
    access-key-id: YOUR_OSS_ACCESS_KEY_ID  # AccessKey ID（请替换）
    access-key-secret: YOUR_OSS_ACCESS_KEY_SECRET  # AccessKey Secret（请替换）
    sts-role-arn: ${OSS_STS_ROLE_ARN:acs:ram::1234567890123456:role/your-oss-role}  # STS 角色 ARN
    sts-duration-seconds: 3600  # STS Token 有效期（秒）
    public-prefix: https://YOUR_BUCKET.oss-cn-beijing.aliyuncs.com/  # 公开访问前缀（请替换Bucket名）
    avatar-dir: avatars/  # 头像存储目录
    book-cover-dir: covers/  # 图书封面存储目录
    review-image-dir: reviews/  # 评价图片存储目录
    book-cover-source-dir: D:/projects/书本图片  # 图书封面本地源目录

  # AI 智能助手配置
  ai:
    enabled: true  # 是否启用 AI 功能

    # 对话（万事通）默认配置
    api-base: ${AI_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}  # API 基础地址
    api-key: YOUR_AI_API_KEY  # API Key（请替换）
    model: ${AI_MODEL:qwen-plus}  # 使用的模型名称

    # AI 搜索 / AI 推荐 独立配置（百度文心千帆）
    search-api-base: https://qianfan.baidubce.com/v2
    search-api-key: YOUR_SEARCH_API_KEY  # 请替换
    search-model: ernie-speed-128k
    recommend-api-base: https://qianfan.baidubce.com/v2
    recommend-api-key: YOUR_RECOMMEND_API_KEY  # 请替换
    recommend-model: ernie-speed-128k

    temperature: 0.7  # 生成温度（创造性，0-1之间）
    max-tokens: 1024  # 最大生成 token 数
    timeout-seconds: 30  # API 调用超时时间（秒）
    history-limit: 10  # 对话历史保留条数

# 日志配置
logging:
  level:
    com.bookstore: debug  # 项目日志级别
