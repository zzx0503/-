<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能书店 - 登录</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    /* ========== Magic Book Login Page ========== */
    .magic-login-body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0d0b1c 0%, #1a1230 40%, #2d1b4e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-family: "STXingkai", "华文行楷", "KaiTi", "楷体", "STKaiti", cursive;
    }

    /* Wrapper: book + auth panel */
    .magic-login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 10;
      position: relative;
      transition: gap 0.8s ease;
    }
    .magic-login-wrapper.open {
      gap: 32px;
    }

    /* Stars background */
    .stars-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.6); }
      50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 6px rgba(255,255,255,0.6); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #ffd700 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp 8s linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
    }

    /* Magic glow behind book */
    .magic-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(138,43,226,0.25) 0%, rgba(75,0,130,0.1) 40%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* 3D Book Scene */
    .magic-book-scene {
      perspective: 1500px;
      z-index: 10;
      position: relative;
      width: 380px;
      height: 500px;
      flex-shrink: 0;
      transition: transform 0.8s ease;
    }

    .magic-book {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      border-radius: 4px 16px 16px 4px;
    }

    /* ===== Book thickness (stacked pages on edges) ===== */
    .book-thickness-right {
      position: absolute;
      right: -10px;
      top: 4px;
      bottom: 4px;
      width: 12px;
      z-index: 4;
      pointer-events: none;
    }
    .thickness-layer {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #e8dcc8 0%, #f0e6d0 50%, #dccfb8 100%);
      border-radius: 0 2px 2px 0;
      box-shadow: inset -1px 0 1px rgba(0,0,0,0.1);
    }
    .book-thickness-bottom {
      position: absolute;
      bottom: -8px;
      left: 4px;
      right: -6px;
      height: 10px;
      z-index: 4;
      pointer-events: none;
    }
    .thickness-layer-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #dccfb8 0%, #f0e6d0 50%, #e8dcc8 100%);
      border-radius: 0 0 2px 2px;
      box-shadow: inset 0 -1px 1px rgba(0,0,0,0.1);
    }

    /* Book pages (the inner content) */
    .book-pages {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #f0e2c4 0%, #f5e9d0 50%, #f0e2c4 100%);
      border-radius: 3px 14px 14px 3px;
      display: flex;
      z-index: 5;
      box-shadow:
        0 15px 50px rgba(0,0,0,0.5),
        inset 20px 0 40px rgba(0,0,0,0.05);
      overflow: hidden;
      font-family: "STXingkai", "华文行楷", "KaiTi", "楷体", "STKaiti", cursive;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .left-page {
      border-right: 2px solid #d4c4a0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(180deg, #f5e9d0 0%, #ede0c0 100%);
    }

    .right-page {
      padding: 28px 24px;
      background: linear-gradient(180deg, #f5e9d0 0%, #ede0c0 100%);
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .magic-book.open .right-page {
      opacity: 1;
    }

    .right-page .spell-icon {
      font-size: 56px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }
    .right-page .spell-title {
      font-size: 20px;
      color: #5b3a17;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    .right-page .spell-text {
      font-size: 13px;
      color: #8b6f47;
      line-height: 2;
      font-style: italic;
    }

    .left-page .brand-icon-large {
      font-size: 72px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .left-page h1 {
      font-size: 28px;
      color: #5b3a17;
      margin: 0 0 10px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .left-page .magic-tagline {
      font-size: 15px;
      color: #8b6f47;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .left-page .magic-decoration {
      font-size: 22px;
      letter-spacing: 8px;
    }

    .page-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        rgba(180, 160, 120, 0.15) 27px,
        rgba(180, 160, 120, 0.15) 28px
      );
      background-position: 0 50px;
    }

    /* Book cover - leather texture magic book */
    .book-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        /* Leather grain noise layer */
        repeating-radial-gradient(
          circle at 30% 30%,
          transparent 0,
          transparent 2px,
          rgba(60, 35, 15, 0.15) 2px,
          rgba(60, 35, 15, 0.15) 3px
        ),
        repeating-radial-gradient(
          circle at 70% 70%,
          transparent 0,
          transparent 2px,
          rgba(80, 50, 25, 0.1) 2px,
          rgba(80, 50, 25, 0.1) 4px
        ),
        /* Base leather gradient */
        linear-gradient(165deg, #6b4423 0%, #8b6239 15%, #5c3a1e 35%, #7a5230 50%, #4a2e16 70%, #6b4423 85%, #5a3518 100%);
      border-radius: 4px 16px 16px 4px;
      border: 3px solid #8b6914;
      box-shadow:
        0 0 30px rgba(184,134,11,0.25),
        0 15px 50px rgba(0,0,0,0.5),
        inset 0 0 60px rgba(30,15,5,0.4),
        inset 2px 2px 8px rgba(139,105,20,0.3),
        inset -2px -2px 8px rgba(0,0,0,0.3);
      transform-origin: left center;
      transition: transform 1.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 20;
      cursor: pointer;
      backface-visibility: visible;
    }

    /* Aged/worn edge effect */
    .book-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px 16px 16px 4px;
      background:
        /* Edge darkening */
        radial-gradient(ellipse at 50% 0%, transparent 60%, rgba(40,20,5,0.4) 100%),
        radial-gradient(ellipse at 50% 100%, transparent 60%, rgba(40,20,5,0.4) 100%),
        radial-gradient(ellipse at 100% 50%, transparent 70%, rgba(40,20,5,0.3) 100%),
        radial-gradient(ellipse at 0% 50%, transparent 70%, rgba(40,20,5,0.5) 100%);
      pointer-events: none;
    }

    .magic-book.open .book-cover {
      transform: rotateY(-130deg);
      pointer-events: none;
    }
    .magic-book.open .cover-content {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .book-spine {
      position: absolute;
      left: -22px;
      top: 4px;
      bottom: 4px;
      width: 26px;
      background:
        repeating-linear-gradient(
          180deg,
          #3d2510 0px,
          #4a2e14 2px,
          #5a3a20 3px,
          #4a2e14 4px,
          #3d2510 6px
        );
      border-radius: 6px 0 0 6px;
      z-index: 25;
      box-shadow:
        -4px 0 12px rgba(0,0,0,0.5),
        inset 3px 0 5px rgba(139,105,20,0.3),
        inset -2px 0 4px rgba(0,0,0,0.4);
    }

    /* Cover content */
    .cover-content {
      text-align: center;
      color: #d4af37;
      padding: 28px 22px;
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* Outer ornate frame */
    .cover-frame-outer {
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(180, 140, 50, 0.5);
      border-radius: 3px 12px 12px 3px;
      pointer-events: none;
    }

    /* Inner ornate frame */
    .cover-frame-inner {
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(180, 140, 50, 0.35);
      border-radius: 2px 10px 10px 2px;
      pointer-events: none;
    }

    /* Corner flourishes */
    .corner-flourish {
      position: absolute;
      width: 24px;
      height: 24px;
      color: rgba(180, 140, 50, 0.7);
      font-size: 20px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .corner-flourish.tl { top: 8px; left: 8px; }
    .corner-flourish.tr { top: 8px; right: 8px; }
    .corner-flourish.bl { bottom: 8px; left: 8px; }
    .corner-flourish.br { bottom: 8px; right: 8px; }

    /* Small corner L-shapes */
    .corner-decoration {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: rgba(180, 140, 50, 0.6);
      border-style: solid;
      border-width: 0;
    }
    .corner-decoration.tl { top: 22px; left: 22px; border-top-width: 2px; border-left-width: 2px; }
    .corner-decoration.tr { top: 22px; right: 22px; border-top-width: 2px; border-right-width: 2px; }
    .corner-decoration.bl { bottom: 22px; left: 22px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-decoration.br { bottom: 22px; right: 22px; border-bottom-width: 2px; border-right-width: 2px; }

    /* Top small title */
    .cover-author {
      font-size: 11px;
      letter-spacing: 5px;
      color: rgba(212, 175, 55, 0.7);
      margin-top: 28px;
      margin-bottom: 16px;
      text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* Central plaque */
    .cover-plaque {
      background:
        linear-gradient(180deg, rgba(90, 60, 30, 0.6) 0%, rgba(70, 45, 20, 0.5) 100%);
      border: 2px solid rgba(180, 140, 50, 0.5);
      border-radius: 4px;
      padding: 20px 24px;
      margin: 8px 0 16px;
      position: relative;
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.3),
        0 1px 2px rgba(180, 140, 50, 0.2);
    }

    .cover-plaque::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(180, 140, 50, 0.25);
      border-radius: 2px;
      pointer-events: none;
    }

    .cover-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #d4af37;
      /* Embossed text effect */
      text-shadow:
        0 1px 1px rgba(0,0,0,0.6),
        0 -1px 1px rgba(255,215,0,0.15),
        0 2px 4px rgba(0,0,0,0.4);
      line-height: 1.3;
    }

    .cover-subtitle {
      font-size: 13px;
      color: rgba(212, 175, 55, 0.8);
      letter-spacing: 3px;
      font-weight: 500;
      margin-top: 6px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* Decorative divider line */
    .cover-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(180,140,50,0.5), transparent);
      margin: 10px auto;
    }

    /* Small magical icon below title */
    .cover-icon {
      font-size: 36px;
      margin: 12px 0 8px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      opacity: 0.85;
    }

    /* Bottom hint text */
    .cover-hint {
      font-size: 12px;
      color: rgba(212, 175, 55, 0.55);
      letter-spacing: 3px;
      margin-top: auto;
      margin-bottom: 8px;
      animation: hintPulse 2.5s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Auth Panel (beside the book) */
    .auth-panel {
      width: 480px;
      opacity: 0;
      flex-shrink: 0;
      transform: translateX(40px) scale(0.92);
      transition: opacity 0.6s ease 0.4s, transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
      background: rgba(255, 248, 241, 0.95);
      border-radius: 16px;
      border: 1px solid rgba(184,134,11,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 60px rgba(138,43,226,0.1);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
    .magic-login-wrapper.open .auth-panel {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .auth-panel-inner {
      width: 480px;
      padding: 36px 44px;
      box-sizing: border-box;
      font-family: "STXingkai", "华文行楷", "KaiTi", "楷体", "STKaiti", cursive;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .auth-header h2 {
      font-size: 22px;
      color: #5b3a17;
      margin: 0 0 6px;
    }
    .auth-header p {
      font-size: 13px;
      color: #8b6f47;
      margin: 0;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0d0b0;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 15px;
      color: #8b6f47;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
      background: none;
      border: none;
      font-weight: 500;
      font-family: inherit;
    }
    .auth-tab.active {
      color: #5b3a17;
      border-bottom-color: #b8860b;
      font-weight: 700;
    }

    .auth-form {
      display: block;
      width: 100%;
    }
    .auth-form .form-row {
      display: block;
      margin-bottom: 16px;
      width: 100%;
    }
    .auth-form label {
      display: block;
      font-size: 14px;
      color: #6b4e2e;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .auth-form input {
      display: block;
      width: 100%;
      min-width: 0;
      padding: 12px 18px;
      border: 1px solid #c9b896;
      border-radius: 24px;
      font-size: 15px;
      background: rgba(255,255,255,0.7);
      color: #5b3a17;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .auth-form input:focus {
      outline: none;
      border-color: #b8860b;
      box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
      background: rgba(255,255,255,0.95);
    }
    .auth-form input::placeholder {
      color: #a09070;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #b8860b, #d4a017);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(184,134,11,0.3);
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(184,134,11,0.4);
    }
    .auth-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .auth-error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    /* Flying books overlay */
    .flying-books-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      display: none;
      overflow: hidden;
    }
    .flying-books-overlay.active {
      display: block;
    }
    .fly-book {
      position: absolute;
      font-size: 36px;
      opacity: 0;
      animation: flyToCenter 2.2s ease-out forwards;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    @keyframes flyToCenter {
      0% {
        opacity: 0;
        transform: translate(var(--startX), var(--startY)) rotate(var(--startRot)) scale(0.3);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(var(--endX), var(--endY)) rotate(var(--endRot)) scale(1.2);
      }
    }

    /* Magic sparkles on cover hover */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffd700;
      border-radius: 50%;
      pointer-events: none;
      animation: sparklePop 0.8s ease-out forwards;
    }
    @keyframes sparklePop {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(2) translate(var(--sx), var(--sy)); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 960px) {
      .magic-login-wrapper.open {
        gap: 20px;
      }
      .magic-login-wrapper.open .auth-panel {
        width: 420px;
      }
      .auth-panel-inner {
        width: 420px;
        padding: 32px 36px;
      }
    }

    @media (max-width: 820px) {
      .magic-login-wrapper {
        flex-direction: column;
      }
      .magic-login-wrapper.open {
        gap: 24px;
      }
      .magic-login-wrapper.open .auth-panel {
        width: 460px;
      }
      .auth-panel-inner {
        width: 460px;
        padding: 32px 40px;
      }
      .magic-book-scene {
        width: 300px;
        height: 400px;
      }
    }

    @media (max-width: 520px) {
      .magic-book-scene {
        width: 280px;
        height: 380px;
      }
      .magic-login-wrapper.open .auth-panel {
        width: 360px;
      }
      .auth-panel-inner {
        width: 360px;
        padding: 24px 28px;
      }
      .cover-title {
        font-size: 24px;
      }
      .cover-icon {
        font-size: 30px;
      }
    }
  </style>
</head>
<body class="magic-login-body">
  <!-- Starry sky -->
  <div class="stars-container" id="stars"></div>

  <!-- Magic glow -->
  <div class="magic-glow"></div>

  <!-- Wrapper: Book + Auth Panel -->
  <div class="magic-login-wrapper" id="loginWrapper">
    <!-- Magic Book -->
    <div class="magic-book-scene">
      <div class="magic-book" id="magicBook">
        <!-- Spine -->
        <div class="book-spine"></div>

        <!-- Thickness layers (right edge) -->
        <div class="book-thickness-right">
          <div class="thickness-layer" style="right:0px"></div>
          <div class="thickness-layer" style="right:2px"></div>
          <div class="thickness-layer" style="right:4px"></div>
          <div class="thickness-layer" style="right:6px"></div>
          <div class="thickness-layer" style="right:8px"></div>
          <div class="thickness-layer" style="right:10px"></div>
        </div>
        <div class="book-thickness-bottom">
          <div class="thickness-layer-bottom" style="bottom:0px"></div>
          <div class="thickness-layer-bottom" style="bottom:2px"></div>
          <div class="thickness-layer-bottom" style="bottom:4px"></div>
          <div class="thickness-layer-bottom" style="bottom:6px"></div>
          <div class="thickness-layer-bottom" style="bottom:8px"></div>
        </div>

        <!-- Inner pages -->
        <div class="book-pages">
          <div class="page left-page">
            <div class="page-lines"></div>
            <div style="font-size:64px;margin-bottom:20px">&#x270D;</div>
            <h1 style="font-size:42px;letter-spacing:6px">a队作品</h1>
            <div style="font-size:18px;color:#8b6f47;margin-top:16px;line-height:1.8">
              以梦为马<br>不负韶华
            </div>
          </div>
          <div class="page right-page">
            <div class="page-lines"></div>
            <div class="spell-icon">&#x1F9D9;</div>
            <div class="spell-title">智慧之章</div>
            <div class="spell-text">
              书中自有黄金屋<br>
              书中自有颜如玉<br>
              翻开此页<br>
              开启你的阅读之旅
            </div>
          </div>
        </div>

        <!-- Front cover -->
        <div class="book-cover" id="bookCover">
          <div class="cover-content">
            <div class="cover-frame-outer"></div>
            <div class="cover-frame-inner"></div>
            <div class="corner-flourish tl">&#x2726;</div>
            <div class="corner-flourish tr">&#x2726;</div>
            <div class="corner-flourish bl">&#x2726;</div>
            <div class="corner-flourish br">&#x2726;</div>
            <div class="corner-decoration tl"></div>
            <div class="corner-decoration tr"></div>
            <div class="corner-decoration bl"></div>
            <div class="corner-decoration br"></div>

            <div class="cover-author">智 慧 之 门</div>

            <div class="cover-plaque">
              <div class="cover-title">智能书店</div>
              <div class="cover-subtitle">INTELLIGENT BOOKSTORE</div>
            </div>

            <div class="cover-divider"></div>
            <div class="cover-icon">&#x1F3DB;&#xFE0F;</div>
            <div class="cover-divider"></div>

            <div class="cover-hint">&#x2727; 点击翻开 &#x2727;</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Auth Panel (beside the book) -->
    <div class="auth-panel" id="authPanel">
      <div class="auth-panel-inner">
        <div class="auth-header">
          <h2 id="authTitle">欢迎回来</h2>
          <p>在书海中寻找属于你的智慧</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login',this)">登录</button>
          <button class="auth-tab" onclick="switchTab('register',this)">注册</button>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="return doLogin(event)">
          <div class="form-row">
            <label>账号</label>
            <input type="text" id="loginAccount" placeholder="用户名 / 手机号" required>
          </div>
          <div class="form-row">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
          </div>
          <button type="submit" class="auth-btn" id="loginBtn">登 录</button>
          <div class="auth-error" id="loginError"></div>
        </form>

        <form id="registerForm" class="auth-form" style="display:none" onsubmit="return doRegister(event)">
          <div class="form-row">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="3-20位字母数字下划线" required>
          </div>
          <div class="form-row">
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="6-32位密码" required>
          </div>
          <div class="form-row">
            <label>手机号</label>
            <input type="text" id="regPhone" placeholder="11位手机号" required>
          </div>
          <button type="submit" class="auth-btn" id="regBtn">注 册</button>
          <div class="auth-error" id="regError"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Flying books animation overlay -->
  <div class="flying-books-overlay" id="flyingBooks"></div>

  <script>
    /* ========== Star Background ========== */
    function createStars() {
      const container = document.getElementById('stars');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', (Math.random() * 5) + 's');
        container.appendChild(star);
      }
    }

    /* ========== Floating Particles ========== */
    function createParticles() {
      const body = document.body;
      const count = 15;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 6 + 6) + 's';
        p.style.animationDelay = (Math.random() * 8) + 's';
        p.style.width = (Math.random() * 4 + 2) + 'px';
        p.style.height = p.style.width;
        body.appendChild(p);
      }
    }

    /* ========== Book Open ========== */
    const magicBook = document.getElementById('magicBook');
    const bookCover = document.getElementById('bookCover');
    const loginWrapper = document.getElementById('loginWrapper');
    let isOpen = false;

    function openBook() {
      if (isOpen) return;
      isOpen = true;
      magicBook.classList.add('open');
      loginWrapper.classList.add('open');
      // Add sparkles on open
      createSparkles();
    }

    bookCover.addEventListener('click', openBook);

    /* ========== Sparkles on cover click ========== */
    function createSparkles() {
      const rect = bookCover.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      for (let i = 0; i < 12; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = centerX + 'px';
        sp.style.top = centerY + 'px';
        const angle = (Math.PI * 2 * i) / 12;
        const dist = 60 + Math.random() * 40;
        sp.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
        sp.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 800);
      }
    }

    /* ========== Tab Switching ========== */
    function switchTab(tab, el) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('loginError').textContent = '';
      document.getElementById('regError').textContent = '';
      document.getElementById('authTitle').textContent = tab === 'login' ? '欢迎回来' : '加入书店';
    }

    /* ========== Flying Books Animation ========== */
    const bookEmojis = ['&#x1F4DA;', '&#x1F4D6;', '&#x1F4D5;', '&#x1F4D7;', '&#x1F4D8;', '&#x1F4D9;', '&#x1F4D3;', '&#x1F4D4;'];
    function triggerFlyingBooks() {
      const overlay = document.getElementById('flyingBooks');
      overlay.innerHTML = '';
      overlay.classList.add('active');

      const w = window.innerWidth;
      const h = window.innerHeight;
      const cx = w / 2;
      const cy = h / 2;

      for (let i = 0; i < 20; i++) {
        const b = document.createElement('div');
        b.className = 'fly-book';
        b.innerHTML = bookEmojis[Math.floor(Math.random() * bookEmojis.length)];

        // Random start position around the edges
        const side = Math.floor(Math.random() * 4);
        let sx, sy;
        if (side === 0) { sx = Math.random() * w; sy = -60; }
        else if (side === 1) { sx = w + 60; sy = Math.random() * h; }
        else if (side === 2) { sx = Math.random() * w; sy = h + 60; }
        else { sx = -60; sy = Math.random() * h; }

        const ex = cx + (Math.random() - 0.5) * 200;
        const ey = cy + (Math.random() - 0.5) * 200;

        b.style.setProperty('--startX', (sx - cx) + 'px');
        b.style.setProperty('--startY', (sy - cy) + 'px');
        b.style.setProperty('--endX', (ex - cx) + 'px');
        b.style.setProperty('--endY', (ey - cy) + 'px');
        b.style.setProperty('--startRot', (Math.random() * 360) + 'deg');
        b.style.setProperty('--endRot', (Math.random() * 720 + 360) + 'deg');
        b.style.left = cx + 'px';
        b.style.top = cy + 'px';
        b.style.fontSize = (Math.random() * 24 + 24) + 'px';
        b.style.animationDelay = (Math.random() * 0.5) + 's';

        overlay.appendChild(b);
      }

      // Clear overlay after animation
      setTimeout(() => {
        overlay.classList.remove('active');
        overlay.innerHTML = '';
      }, 2800);
    }

    /* ========== Login ========== */
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const originalText = btn.textContent;
      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            account: document.getElementById('loginAccount').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const result = await res.json();
        if (result.code === 200) {
          triggerFlyingBooks();
          localStorage.setItem('accessToken', result.data.accessToken);
          localStorage.setItem('refreshToken', result.data.refreshToken);
          localStorage.setItem('user', JSON.stringify(result.data.user));
          setTimeout(() => {
            window.location.href = 'home.html';
          }, 2200);
        } else {
          document.getElementById('loginError').textContent = result.msg || '登录失败';
        }
      } catch (err) {
        document.getElementById('loginError').textContent = '网络错误';
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
      return false;
    }

    /* ========== Register ========== */
    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const originalText = btn.textContent;
      btn.textContent = '注册中...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value,
            phone: document.getElementById('regPhone').value
          })
        });
        const result = await res.json();
        if (result.code === 200) {
          triggerFlyingBooks();
          localStorage.setItem('accessToken', result.data.accessToken);
          localStorage.setItem('refreshToken', result.data.refreshToken);
          localStorage.setItem('user', JSON.stringify(result.data.user));
          setTimeout(() => {
            window.location.href = 'home.html';
          }, 2200);
        } else {
          document.getElementById('regError').textContent = result.msg || '注册失败';
        }
      } catch (err) {
        document.getElementById('regError').textContent = '网络错误';
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
      return false;
    }

    /* ========== Init ========== */
    if (localStorage.getItem('accessToken')) {
      window.location.href = 'home.html';
    }
    createStars();
    createParticles();
  </script>
</body>
</html>
