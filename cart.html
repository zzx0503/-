<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能书店 - 购物车</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .cart-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cart-toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
    .cart-toolbar input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .cart-toolbar .btn-text {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }
    .cart-toolbar .btn-text:hover {
      color: #e74c3c;
    }

    .cart-list {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .cart-item .ci-check {
      flex-shrink: 0;
    }
    .cart-item .ci-check input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .cart-item .ci-cover {
      width: 80px;
      height: 100px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .cart-item .ci-info {
      flex: 1;
      min-width: 0;
    }
    .cart-item .ci-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }
    .cart-item .ci-price {
      font-size: 14px;
      color: #e74c3c;
      font-weight: 600;
    }
    .cart-item .ci-stock {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .cart-item .ci-qty {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 0 12px;
    }
    .cart-item .ci-qty button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .cart-item .ci-qty button:first-child {
      border-radius: 6px 0 0 6px;
    }
    .cart-item .ci-qty button:last-child {
      border-radius: 0 6px 6px 0;
    }
    .cart-item .ci-qty input {
      width: 40px;
      height: 28px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-left: none;
      border-right: none;
      text-align: center;
      font-size: 14px;
      outline: none;
    }
    .cart-item .ci-subtotal {
      width: 90px;
      text-align: right;
      font-size: 15px;
      color: #e74c3c;
      font-weight: 700;
      flex-shrink: 0;
    }
    .cart-item .ci-remove {
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }
    .cart-item .ci-remove button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
    }
    .cart-item .ci-remove button:hover {
      color: #e74c3c;
    }

    .cart-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .cart-empty p {
      margin-bottom: 16px;
    }
    .cart-empty a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .cart-footer {
      position: sticky;
      bottom: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
      border-radius: 0 0 var(--radius) var(--radius);
      margin-top: -1px;
    }
    .cart-footer .cf-total {
      font-size: 16px;
    }
    .cart-footer .cf-total strong {
      font-size: 24px;
      color: #e74c3c;
    }
    .cart-footer .cf-btn {
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      background: #e74c3c;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .cart-footer .cf-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: var(--white);
      border-radius: var(--radius);
      width: 480px;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .modal-box h3 {
      margin-bottom: 16px;
      font-size: 18px;
    }
    .modal-box .addr-option {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .modal-box .addr-option:hover,
    .modal-box .addr-option.selected {
      border-color: var(--primary);
      background: #fffaf5;
    }
    .modal-box .addr-option input {
      margin-top: 3px;
    }
    .modal-box .addr-info {
      font-size: 14px;
      line-height: 1.5;
    }
    .modal-box .addr-tag {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }
    .modal-actions button {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      font-size: 14px;
    }
    .modal-actions .btn-confirm {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    /* Coupon options inside checkout modal */
    .cp-option {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cp-option:hover,
    .cp-option.selected {
      border-color: var(--primary);
      background: #fffaf5;
    }
    .cp-option input[type="radio"] {
      margin: 0;
    }
    .cp-option .cp-info {
      flex: 1;
      min-width: 0;
    }
    .cp-option .cp-name {
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cp-option .cp-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .cp-option .cp-discount {
      flex-shrink: 0;
      color: #e74c3c;
      font-weight: 700;
      font-size: 14px;
    }
    .cp-option.disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .cp-option.disabled:hover {
      border-color: var(--border);
      background: var(--white);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>&#x1F4DA;</span>
        <span>智能书店</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="user.html"><span>&#x1F464;</span><span>用户中心</span></a>
        <a class="nav-item" href="home.html"><span>&#x1F3E0;</span><span>首页</span></a>
        <a class="nav-item" href="favorite.html"><span>&#x1F4D6;</span><span>我的书架</span></a>
        <a class="nav-item active" href="cart.html"><span>&#x1F6D2;</span><span>购物车</span></a>
        <a class="nav-item" href="order.html"><span>&#x1F4E6;</span><span>我的订单</span></a>
        <a class="nav-item" href="promotions.html"><span>&#x1F381;</span><span>优惠</span></a>
        <a class="nav-item" href="ai-chat.html"><span>&#x1F916;</span><span>万事通</span></a>
        <a class="nav-item admin-only" id="adminNav" href="admin/index.html" style="display:none">
          <span>&#x2699;&#xFE0F;</span><span>后台管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar">&#x1F464;</div>
          <div class="info">
            <div class="name" id="sideName">加载中</div>
            <div class="role" id="sideRole">USER</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <div class="main-header">
        <h1>&#x1F6D2; 购物车</h1>
        <span style="color:var(--text-secondary);font-size:14px">管理您的选购商品</span>
      </div>
      <div class="main-body">
        <div class="cart-toolbar">
          <label><input type="checkbox" id="checkAll" onchange="toggleCheckAll()"> 全选</label>
          <button class="btn-text" onclick="clearCart()">清空购物车</button>
        </div>

        <div class="cart-list" id="cartList">
          <div class="cart-empty">
            <p>购物车还是空的，快去首页挑选好书吧~</p>
            <a href="home.html">去逛逛 &#x2192;</a>
          </div>
        </div>

        <div class="cart-footer" id="cartFooter" style="display:none">
          <div class="cf-total">
            合计（不含运费）：<strong>&yen;<span id="totalPrice">0.00</span></strong>
          </div>
          <button class="cf-btn" id="checkoutBtn" onclick="openCheckout()">去结算</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-box" style="width:520px;max-width:96vw">
      <h3>确认订单</h3>

      <div style="font-size:14px;font-weight:600;margin:14px 0 8px">收货地址</div>
      <div id="addressOptions"><p style="color:var(--text-secondary)">加载中...</p></div>

      <div style="font-size:14px;font-weight:600;margin:18px 0 8px">优惠券</div>
      <div id="couponOptions"><p style="color:var(--text-secondary)">加载中...</p></div>

      <div style="margin-top:18px;padding:12px 14px;border-radius:8px;background:#fffaf3;border:1px solid var(--border);font-size:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span>商品合计：</span>
          <span>&yen;<span id="sumOriginal">0.00</span></span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span>优惠：</span>
          <span style="color:#27ae60">-&yen;<span id="sumDiscount">0.00</span></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;border-top:1px dashed var(--border);padding-top:8px">
          <span>应付：</span>
          <strong style="color:#e74c3c;font-size:22px">&yen;<span id="sumPay">0.00</span></strong>
        </div>
      </div>

      <div class="modal-actions">
        <button onclick="closeCheckout()">取消</button>
        <button class="btn-confirm" onclick="confirmOrder()">确认下单</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      window.location.href = 'index.html';
    }

    async function api(path, opts) {
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(path, opts);
      return res.json();
    }

    let cartItems = [];
    let addresses = [];
    let selectedAddrId = null;
    let usableCoupons = [];
    let selectedCouponId = null; // null = 不使用优惠券
    let cartTotalAmount = 0;

    async function loadUser() {
      try {
        const result = await api('/api/user/me');
        if (result.code === 200) {
          const name = result.data.nickname || result.data.username;
          document.getElementById('sideName').textContent = name;
          document.getElementById('sideRole').textContent = result.data.role || 'USER';
          if (result.data.role === 'ADMIN') {
            document.getElementById('adminNav').style.display = 'flex';
          }
        } else {
          logout();
        }
      } catch (err) {
        document.getElementById('sideName').textContent = '未知';
      }
    }

    async function loadCart() {
      const result = await api('/api/cart');
      const container = document.getElementById('cartList');
      const footer = document.getElementById('cartFooter');
      if (result.code !== 200 || !result.data || !result.data.length) {
        cartItems = [];
        container.innerHTML = `
          <div class="cart-empty">
            <p>购物车还是空的，快去首页挑选好书吧~</p>
            <a href="home.html">去逛逛 &#x2192;</a>
          </div>`;
        footer.style.display = 'none';
        return;
      }
      cartItems = result.data;
      renderCart();
      footer.style.display = '';
      updateTotal();
    }

    function renderCart() {
      const container = document.getElementById('cartList');
      container.innerHTML = cartItems.map(item => `
        <div class="cart-item" data-id="${item.id}">
          <div class="ci-check">
            <input type="checkbox" ${item.selected ? 'checked' : ''} onchange="toggleItem(${item.id})">
          </div>
          <div class="ci-cover" style="background-image:url('${item.bookCover || `https://picsum.photos/seed/${item.bookId}/300/400`}')" onclick="location.href='detail.html?id=${item.bookId}'"></div>
          <div class="ci-info">
            <div class="ci-title" onclick="location.href='detail.html?id=${item.bookId}'">${item.bookTitle}</div>
            <div class="ci-price">&yen;${Number(item.bookPrice || 0).toFixed(2)}</div>
            <div class="ci-stock">库存 ${item.bookStock || 0} 件</div>
          </div>
          <div class="ci-qty">
            <button onclick="changeQty(${item.id}, -1)">-</button>
            <input type="text" value="${item.quantity}" readonly>
            <button onclick="changeQty(${item.id}, 1)">+</button>
          </div>
          <div class="ci-subtotal">&yen;${(Number(item.bookPrice || 0) * item.quantity).toFixed(2)}</div>
          <div class="ci-remove">
            <button onclick="removeItem(${item.id})">&times;</button>
          </div>
        </div>
      `).join('');
      updateCheckAllState();
    }

    async function changeQty(id, delta) {
      const item = cartItems.find(c => c.id === id);
      if (!item) return;
      const newQty = item.quantity + delta;
      if (newQty < 1) return;
      if (newQty > (item.bookStock || 999)) {
        alert('超出库存上限');
        return;
      }
      const result = await api(`/api/cart/${id}/quantity?quantity=${newQty}`, { method: 'PUT' });
      if (result.code === 200) {
        item.quantity = newQty;
        renderCart();
        updateTotal();
      } else {
        alert(result.msg || '修改失败');
      }
    }

    async function toggleItem(id) {
      const item = cartItems.find(c => c.id === id);
      if (!item) return;
      const newSel = item.selected ? 0 : 1;
      const result = await api(`/api/cart/${id}/selected?selected=${newSel}`, { method: 'PUT' });
      if (result.code === 200) {
        item.selected = newSel;
        updateCheckAllState();
        updateTotal();
      } else {
        alert(result.msg || '操作失败');
        loadCart();
      }
    }

    function toggleCheckAll() {
      const checked = document.getElementById('checkAll').checked;
      const promises = cartItems.map(item => {
        const newSel = checked ? 1 : 0;
        if (item.selected === newSel) return Promise.resolve();
        return api(`/api/cart/${item.id}/selected?selected=${newSel}`, { method: 'PUT' }).then(r => {
          if (r.code === 200) item.selected = newSel;
        });
      });
      Promise.all(promises).then(() => {
        renderCart();
        updateTotal();
      });
    }

    function updateCheckAllState() {
      const all = cartItems.length > 0 && cartItems.every(c => c.selected === 1);
      document.getElementById('checkAll').checked = all;
    }

    function updateTotal() {
      const total = cartItems
        .filter(c => c.selected === 1)
        .reduce((sum, c) => sum + Number(c.bookPrice || 0) * c.quantity, 0);
      document.getElementById('totalPrice').textContent = total.toFixed(2);
      const hasSelected = cartItems.some(c => c.selected === 1);
      document.getElementById('checkoutBtn').disabled = !hasSelected;
    }

    async function removeItem(id) {
      if (!confirm('确定删除该商品？')) return;
      const result = await api(`/api/cart/${id}`, { method: 'DELETE' });
      if (result.code === 200) {
        cartItems = cartItems.filter(c => c.id !== id);
        if (!cartItems.length) {
          loadCart();
        } else {
          renderCart();
          updateTotal();
        }
      } else {
        alert(result.msg || '删除失败');
      }
    }

    async function clearCart() {
      if (!cartItems.length) return;
      if (!confirm('确定清空购物车？')) return;
      const result = await api('/api/cart', { method: 'DELETE' });
      if (result.code === 200) {
        loadCart();
      } else {
        alert(result.msg || '清空失败');
      }
    }

    // ---------- Checkout ----------
    async function openCheckout() {
      const selected = cartItems.filter(c => c.selected === 1);
      if (!selected.length) {
        alert('请先选择商品');
        return;
      }
      const selectedIds = selected.map(c => c.id);
      document.getElementById('checkoutModal').classList.add('active');

      // 重置选中状态
      selectedAddrId = null;
      selectedCouponId = null;
      usableCoupons = [];
      cartTotalAmount = selected.reduce((sum, c) => sum + Number(c.bookPrice || 0) * c.quantity, 0);
      document.getElementById('addressOptions').innerHTML = '<p style="color:var(--text-secondary)">加载中...</p>';
      document.getElementById('couponOptions').innerHTML = '<p style="color:var(--text-secondary)">加载中...</p>';
      updatePriceSummary();

      // 并行拉地址和优惠券
      const [addrRes, calcRes] = await Promise.all([
        api('/api/address'),
        api('/api/coupons/calc', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cartItemIds: selectedIds })
        })
      ]);

      // 地址
      const addrBox = document.getElementById('addressOptions');
      if (addrRes.code !== 200 || !addrRes.data || !addrRes.data.length) {
        addrBox.innerHTML = '<p style="color:var(--text-secondary)">暂无收货地址，请先去用户中心添加。</p>';
        selectedAddrId = null;
      } else {
        addresses = addrRes.data;
        selectedAddrId = (addresses.find(a => a.isDefault) || addresses[0]).id;
        renderAddresses();
      }

      // 优惠券
      if (calcRes.code === 200 && calcRes.data) {
        cartTotalAmount = Number(calcRes.data.totalAmount || cartTotalAmount);
        usableCoupons = calcRes.data.usableCoupons || [];
        // 默认选中后端推荐的最优券
        selectedCouponId = calcRes.data.bestCoupon ? calcRes.data.bestCoupon.id : null;
        renderCoupons();
      } else {
        usableCoupons = [];
        selectedCouponId = null;
        document.getElementById('couponOptions').innerHTML =
          `<p style="color:var(--text-secondary)">${calcRes.msg || '暂无可用优惠券'}</p>`;
      }
      updatePriceSummary();
    }

    function renderAddresses() {
      const box = document.getElementById('addressOptions');
      box.innerHTML = addresses.map(a => `
        <div class="addr-option ${a.id === selectedAddrId ? 'selected' : ''}" onclick="selectAddr(${a.id})">
          <input type="radio" name="addr" ${a.id === selectedAddrId ? 'checked' : ''}>
          <div class="addr-info">
            <div><strong>${a.receiver}</strong> ${a.phone}${a.isDefault ? '<span class="addr-tag">默认</span>' : ''}</div>
            <div style="color:var(--text-secondary);margin-top:2px">${a.province || ''} ${a.city || ''} ${a.district || ''} ${a.detailAddress}</div>
          </div>
        </div>
      `).join('');
    }

    function selectAddr(id) {
      selectedAddrId = id;
      renderAddresses();
    }

    function renderCoupons() {
      const box = document.getElementById('couponOptions');
      const noneOpt = `
        <div class="cp-option ${selectedCouponId === null ? 'selected' : ''}" onclick="selectCoupon(null)">
          <input type="radio" name="cp" ${selectedCouponId === null ? 'checked' : ''}>
          <div class="cp-info">
            <div class="cp-name">不使用优惠券</div>
            <div class="cp-desc">本单按原价结算</div>
          </div>
        </div>
      `;
      if (!usableCoupons.length) {
        box.innerHTML = noneOpt + `<p style="color:var(--text-secondary);margin-top:6px;font-size:12px">暂无可用优惠券，可前往「优惠」页领取</p>`;
        return;
      }
      const opts = usableCoupons.map(c => {
        const discount = computeDiscount(c, cartTotalAmount);
        const ruleText = describeRule(c);
        return `
          <div class="cp-option ${c.id === selectedCouponId ? 'selected' : ''}" onclick="selectCoupon(${c.id})">
            <input type="radio" name="cp" ${c.id === selectedCouponId ? 'checked' : ''}>
            <div class="cp-info">
              <div class="cp-name">${escapeHtml(c.name || '优惠券')}</div>
              <div class="cp-desc">${ruleText}</div>
            </div>
            <div class="cp-discount">-¥${discount.toFixed(2)}</div>
          </div>
        `;
      }).join('');
      box.innerHTML = noneOpt + opts;
    }

    function selectCoupon(id) {
      selectedCouponId = id;
      renderCoupons();
      updatePriceSummary();
    }

    function describeRule(c) {
      const value = Number(c.discountValue || 0);
      const threshold = Number(c.threshold || 0);
      if (c.type === 'DISCOUNT') {
        return (threshold > 0 ? `满 ¥${threshold.toFixed(0)} ` : '') + `打 ${(value * 10).toFixed(1)} 折`;
      }
      if (c.type === 'AMOUNT') {
        return `直减 ¥${value.toFixed(0)}` + (threshold > 0 ? ` (满 ¥${threshold.toFixed(0)})` : '');
      }
      return `满 ¥${threshold.toFixed(0)} 减 ¥${value.toFixed(0)}`;
    }

    function computeDiscount(c, total) {
      // 直接使用后端返回的 discountValue（已计算好的优惠金额）
      return Number(c.discountValue || 0);
    }


    function updatePriceSummary() {
      const total = cartTotalAmount;
      let discount = 0;
      if (selectedCouponId !== null) {
        const c = usableCoupons.find(x => x.id === selectedCouponId);
        if (c) discount = computeDiscount(c, total);
      }
      const pay = Math.max(0, total - discount);
      document.getElementById('sumOriginal').textContent = total.toFixed(2);
      document.getElementById('sumDiscount').textContent = discount.toFixed(2);
      document.getElementById('sumPay').textContent = pay.toFixed(2);
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').classList.remove('active');
    }

    async function confirmOrder() {
      if (!selectedAddrId) {
        alert('请选择收货地址');
        return;
      }
      const selectedIds = cartItems.filter(c => c.selected === 1).map(c => c.id);
      const body = { cartItemIds: selectedIds, addressId: selectedAddrId };
      if (selectedCouponId) body.userCouponId = selectedCouponId;
      const result = await api('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (result.code === 200) {
        closeCheckout();
        location.href = 'order-detail.html?orderNo=' + encodeURIComponent(result.data.orderNo);
      } else {
        alert(result.msg || '下单失败');
      }
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    loadUser();
    loadCart();
  </script>
</body>
</html>
