<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能书店 - 万事通</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .ai-wrap {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      height: calc(100vh - 120px);
      min-height: 500px;
    }
    .ai-sidepanel {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ai-sidepanel .new-btn {
      margin: 12px;
      padding: 10px 0;
      border: none;
      background: linear-gradient(135deg,#5a8dee,#4d6fff);
      color: var(--white);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .ai-sidepanel .sessions {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
    }
    .ai-sidepanel .session {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      position: relative;
    }
    .ai-sidepanel .session:hover { background: #f6f7fb; }
    .ai-sidepanel .session.active {
      background: #eef2ff;
      color: #4d6fff;
    }
    .ai-sidepanel .session .title {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 18px;
    }
    .ai-sidepanel .session .desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ai-sidepanel .session .menu {
      position: absolute;
      top: 8px;
      right: 6px;
      display: none;
      gap: 4px;
    }
    .ai-sidepanel .session:hover .menu { display: flex; }
    .ai-sidepanel .session .menu button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 0 2px;
    }
    .ai-sidepanel .session .menu button:hover { color: #e74c3c; }

    .ai-chat {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ai-chat .header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-main);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ai-chat .header .small {
      color: var(--text-secondary);
      font-weight: 400;
      font-size: 12px;
    }
    .ai-chat .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 22px;
      background: #fafbff;
    }
    .ai-msg {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ai-msg .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .ai-msg.user { flex-direction: row-reverse; }
    .ai-msg.user .avatar { background: #4d6fff; color: #fff; }
    .ai-msg.assistant .avatar { background: #ffe7d6; color: #e65100; }
    .ai-msg .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ai-msg.user .bubble {
      background: #4d6fff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .ai-msg.assistant .bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .ai-msg .refs {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      max-width: 75%;
    }
    .ai-msg .ref-card {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .ai-msg .ref-card:hover { border-color: #4d6fff; }
    .ai-msg .ref-card .cover {
      width: 38px;
      height: 50px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .ai-msg .ref-card .info {
      flex: 1;
      min-width: 0;
      font-size: 12px;
    }
    .ai-msg .ref-card .info .t {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ai-msg .ref-card .info .a {
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .ai-msg .ref-card .info .p {
      color: #e74c3c;
      font-weight: 700;
      margin-top: 2px;
    }

    .ai-empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 60px 20px;
    }
    .ai-empty h3 { margin-bottom: 8px; color: var(--text-main); font-size: 18px; }
    .ai-empty .tips {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .ai-empty .tip {
      padding: 10px 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    .ai-empty .tip:hover { border-color: #4d6fff; color: #4d6fff; }

    .ai-input {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--white);
    }
    .ai-input textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 44px;
      font-family: inherit;
    }
    .ai-input textarea:focus { border-color: #4d6fff; }
    .ai-input .send-btn {
      padding: 0 22px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg,#5a8dee,#4d6fff);
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .ai-input .send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 0 4px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>&#x1F4DA;</span>
        <span>智能书店</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="user.html"><span>&#x1F464;</span><span>用户中心</span></a>
        <a class="nav-item" href="home.html"><span>&#x1F3E0;</span><span>首页</span></a>
        <a class="nav-item" href="favorite.html"><span>&#x1F4D6;</span><span>我的书架</span></a>
        <a class="nav-item" href="cart.html"><span>&#x1F6D2;</span><span>购物车</span></a>
        <a class="nav-item" href="order.html"><span>&#x1F4E6;</span><span>我的订单</span></a>
        <a class="nav-item" href="promotions.html"><span>&#x1F381;</span><span>优惠</span></a>
        <a class="nav-item active" href="ai-chat.html"><span>&#x1F916;</span><span>万事通</span></a>
        <a class="nav-item admin-only" id="adminNav" href="admin/index.html" style="display:none">
          <span>&#x2699;&#xFE0F;</span><span>后台管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar">&#x1F464;</div>
          <div class="info">
            <div class="name" id="sideName">加载中</div>
            <div class="role" id="sideRole">USER</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="main-header">
        <h1>&#x1F916; 万事通</h1>
        <span style="color:var(--text-secondary);font-size:14px">小书 · 你的智能选书顾问</span>
      </div>
      <div class="main-body">
        <div class="ai-wrap">
          <div class="ai-sidepanel">
            <button class="new-btn" onclick="newChat()">+ 新建对话</button>
            <div class="sessions" id="sessionList"><div style="text-align:center;color:var(--text-secondary);padding:20px 0;font-size:13px">加载中...</div></div>
          </div>

          <div class="ai-chat">
            <div class="header">
              <span id="chatTitle">新对话</span>
              <span class="small" id="chatHint">告诉我你想看什么书</span>
            </div>
            <div class="messages" id="messages">
              <div class="ai-empty">
                <div style="font-size:36px;margin-bottom:10px">&#x1F916;</div>
                <h3>嗨，我是小书</h3>
                <div>我可以帮你推荐好书、解答疑问。试试问我：</div>
                <div class="tips" id="tips">
                  <div class="tip" onclick="setInput('给我推荐几本科幻小说')">&#x1F4D6; 给我推荐几本科幻小说</div>
                  <div class="tip" onclick="setInput('我想找一本适合 5 岁孩子的绘本')">&#x1F4DA; 我想找一本适合 5 岁孩子的绘本</div>
                  <div class="tip" onclick="setInput('《三体》是一本什么样的书？')">&#x2728; 《三体》是一本什么样的书？</div>
                  <div class="tip" onclick="setInput('近期有什么畅销的经济学书籍？')">&#x1F4B0; 近期有什么畅销的经济学书籍？</div>
                </div>
              </div>
            </div>
            <div class="ai-input">
              <textarea id="msgInput" placeholder="按 Enter 发送，Shift+Enter 换行" onkeydown="onKey(event)" oninput="autoSize(this)"></textarea>
              <button class="send-btn" id="sendBtn" onclick="send()">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) location.href = 'index.html';
    async function api(path, opts) {
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(path, opts);
      return res.json();
    }

    let sessions = [];
    let currentSessionId = null;
    let messages = [];
    let sending = false;

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function autoSize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(140, el.scrollHeight) + 'px';
    }

    function setInput(text) {
      const ta = document.getElementById('msgInput');
      ta.value = text;
      autoSize(ta);
      ta.focus();
    }

    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    async function loadSessions() {
      const result = await api('/api/ai/sessions');
      const list = document.getElementById('sessionList');
      if (result.code !== 200) {
        list.innerHTML = `<div style="text-align:center;color:var(--text-secondary);padding:20px 0;font-size:13px">${result.msg || '加载失败'}</div>`;
        return;
      }
      sessions = result.data || [];
      if (!sessions.length) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px 0;font-size:13px">暂无历史对话</div>';
        return;
      }
      list.innerHTML = sessions.map(s => `
        <div class="session ${s.id === currentSessionId ? 'active' : ''}" onclick="openSession(${s.id})">
          <div class="title">${escapeHtml(s.title || '新对话')}</div>
          <div class="desc">${escapeHtml(s.lastMessage || '点击查看对话')}</div>
          <div class="menu" onclick="event.stopPropagation()">
            <button title="重命名" onclick="renameSession(${s.id}, '${(s.title || '').replace(/'/g, "\\'")}')">&#x270F;&#xFE0F;</button>
            <button title="删除" onclick="deleteSession(${s.id})">&#x1F5D1;</button>
          </div>
        </div>
      `).join('');
    }

    async function openSession(id) {
      currentSessionId = id;
      const sess = sessions.find(s => s.id === id);
      document.getElementById('chatTitle').textContent = sess ? sess.title : '对话';
      document.getElementById('chatHint').textContent = '继续聊聊吧';
      const result = await api('/api/ai/sessions/' + id + '/messages');
      if (result.code !== 200) {
        alert(result.msg || '加载消息失败');
        return;
      }
      messages = result.data || [];
      renderMessages();
      loadSessions();
    }

    function newChat() {
      currentSessionId = null;
      messages = [];
      document.getElementById('chatTitle').textContent = '新对话';
      document.getElementById('chatHint').textContent = '告诉我你想看什么书';
      const m = document.getElementById('messages');
      m.innerHTML = `
        <div class="ai-empty">
          <div style="font-size:36px;margin-bottom:10px">&#x1F916;</div>
          <h3>嗨，我是小书</h3>
          <div>我可以帮你推荐好书、解答疑问。试试问我：</div>
          <div class="tips">
            <div class="tip" onclick="setInput('给我推荐几本科幻小说')">&#x1F4D6; 给我推荐几本科幻小说</div>
            <div class="tip" onclick="setInput('我想找一本适合 5 岁孩子的绘本')">&#x1F4DA; 我想找一本适合 5 岁孩子的绘本</div>
            <div class="tip" onclick="setInput('《三体》是一本什么样的书？')">&#x2728; 《三体》是一本什么样的书？</div>
            <div class="tip" onclick="setInput('近期有什么畅销的经济学书籍？')">&#x1F4B0; 近期有什么畅销的经济学书籍？</div>
          </div>
        </div>
      `;
      loadSessions();
    }

    function renderMessages() {
      const m = document.getElementById('messages');
      if (!messages.length) {
        m.innerHTML = '<div class="ai-empty"><div style="font-size:36px;margin-bottom:10px">&#x1F4AC;</div><h3>这是一段空对话</h3><div>开始问点什么吧</div></div>';
        return;
      }
      m.innerHTML = messages.map(renderMsg).join('');
      m.scrollTop = m.scrollHeight;
    }

    function renderMsg(msg) {
      const isUser = msg.role === 'user';
      const refsHtml = (msg.referencedBooks && msg.referencedBooks.length)
        ? `<div class="refs">${msg.referencedBooks.map(b => `
            <div class="ref-card" onclick="location.href='detail.html?id=${b.id}'">
              <div class="cover" style="background-image:url('${b.coverKey || `https://picsum.photos/seed/${b.id}/120/160`}')"></div>
              <div class="info">
                <div class="t">${escapeHtml(b.title || '')}</div>
                <div class="a">${escapeHtml(b.author || '')}</div>
                <div class="p">¥${Number(b.price || 0).toFixed(2)}</div>
              </div>
            </div>
          `).join('')}</div>`
        : '';
      const inner = `
        <div class="avatar">${isUser ? '&#x1F464;' : '&#x1F916;'}</div>
        <div style="display:flex;flex-direction:column;${isUser ? 'align-items:flex-end' : 'align-items:flex-start'}">
          <div class="bubble">${escapeHtml(msg.content || '')}</div>
          ${refsHtml}
        </div>
      `;
      return `<div class="ai-msg ${isUser ? 'user' : 'assistant'}">${inner}</div>`;
    }

    function appendMessage(msg) {
      messages.push(msg);
      renderMessages();
    }

    function appendTyping() {
      const m = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'ai-msg assistant';
      div.id = 'typingMsg';
      div.innerHTML = `
        <div class="avatar">&#x1F916;</div>
        <div>
          <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
        </div>
      `;
      m.appendChild(div);
      m.scrollTop = m.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typingMsg');
      if (t) t.remove();
    }

    async function send() {
      if (sending) return;
      const ta = document.getElementById('msgInput');
      const text = ta.value.trim();
      if (!text) return;
      sending = true;
      document.getElementById('sendBtn').disabled = true;
      ta.value = '';
      autoSize(ta);

      appendMessage({ role: 'user', content: text, referencedBooks: [], createTime: new Date().toISOString() });
      appendTyping();

      try {
        const result = await api('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentSessionId, message: text })
        });
        removeTyping();
        if (result.code !== 200) {
          appendMessage({ role: 'assistant', content: '抱歉，' + (result.msg || '我现在有点忙，请稍后再试'), referencedBooks: [] });
        } else {
          if (currentSessionId == null && result.data.sessionId) {
            currentSessionId = result.data.sessionId;
          }
          appendMessage({
            role: 'assistant',
            content: result.data.reply,
            referencedBooks: result.data.referencedBooks || [],
            createTime: result.data.createTime
          });
          loadSessions();
        }
      } catch (e) {
        removeTyping();
        appendMessage({ role: 'assistant', content: '网络异常，请稍后再试。', referencedBooks: [] });
      } finally {
        sending = false;
        document.getElementById('sendBtn').disabled = false;
        ta.focus();
      }
    }

    async function renameSession(id, oldTitle) {
      const title = prompt('新会话标题：', oldTitle || '');
      if (title == null) return;
      const t = title.trim();
      if (!t) return;
      const result = await api('/api/ai/sessions/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: t })
      });
      if (result.code === 200) {
        loadSessions();
        if (id === currentSessionId) document.getElementById('chatTitle').textContent = t;
      } else alert(result.msg || '重命名失败');
    }

    async function deleteSession(id) {
      if (!confirm('确定删除该对话？删除后无法恢复。')) return;
      const result = await api('/api/ai/sessions/' + id, { method: 'DELETE' });
      if (result.code === 200) {
        if (id === currentSessionId) newChat();
        else loadSessions();
      } else alert(result.msg || '删除失败');
    }

    async function loadUser() {
      try {
        const result = await api('/api/user/me');
        if (result.code === 200) {
          const name = result.data.nickname || result.data.username;
          document.getElementById('sideName').textContent = name;
          document.getElementById('sideRole').textContent = result.data.role || 'USER';
          if (result.data.role === 'ADMIN') document.getElementById('adminNav').style.display = 'flex';
        } else logout();
      } catch (e) { document.getElementById('sideName').textContent = '未知'; }
    }
    function logout() { localStorage.clear(); location.href = 'index.html'; }

    loadUser();
    loadSessions();
  </script>
</body>
</html>
