<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 订单管理</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .order-no {
      font-family: ui-monospace, "Menlo", "Consolas", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>&#x2699;&#xFE0F;</span>
        <span>后台管理</span>
      </div>
      <nav class="sidebar-nav" id="adminSideNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar">&#x1F464;</div>
          <div class="info">
            <div class="name" id="sideName">加载中</div>
            <div class="role" id="sideRole">ADMIN</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="main-header">
        <h1>&#x1F4E6; 订单管理</h1>
        <span style="color:var(--text-secondary);font-size:14px">查看全平台订单与发货</span>
      </div>
      <div class="main-body">
        <div class="admin-toolbar">
          <select id="statusSel">
            <option value="">全部状态</option>
            <option value="PENDING_PAY">待付款</option>
            <option value="PAID">待发货</option>
            <option value="SHIPPED">待收货</option>
            <option value="COMPLETED">已完成</option>
            <option value="CANCELLED">已取消</option>
          </select>
          <button class="admin-btn" onclick="reload()">查询</button>
        </div>

        <table class="admin-table">
          <thead>
            <tr>
              <th>订单号</th>
              <th>金额（应付/原价）</th>
              <th>优惠</th>
              <th>支付方式</th>
              <th>状态</th>
              <th>下单时间</th>
              <th>支付时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="8" style="text-align:center;color:var(--text-secondary);padding:30px">加载中...</td></tr>
          </tbody>
        </table>
        <div class="admin-pagi" id="pagi"></div>
      </div>
    </div>
  </div>

  <script src="./common.js"></script>
  <script>
    setActiveNav('orders');

    const STATUS_LABELS = {
      PENDING_PAY: { txt: '待付款', cls: 'tag yellow' },
      PAID:        { txt: '待发货', cls: 'tag green' },
      SHIPPED:     { txt: '待收货', cls: 'tag blue' },
      COMPLETED:   { txt: '已完成', cls: 'tag gray' },
      CANCELLED:   { txt: '已取消', cls: 'tag red' },
    };

    let currentPage = 1;
    const PAGE_SIZE = 15;

    async function reload(page) {
      currentPage = page || 1;
      const status = document.getElementById('statusSel').value;
      const params = new URLSearchParams();
      if (status) params.set('status', status);
      params.set('page', currentPage);
      params.set('size', PAGE_SIZE);
      const result = await api('/api/admin/order?' + params.toString());
      const tbody = document.getElementById('tbody');
      if (result.code !== 200 || !result.data) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--text-secondary);padding:30px">${result.msg || '加载失败'}</td></tr>`;
        document.getElementById('pagi').innerHTML = '';
        return;
      }
      const list = result.data.list || [];
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-secondary);padding:30px">暂无订单</td></tr>';
      } else {
        tbody.innerHTML = list.map(o => {
          const st = STATUS_LABELS[o.status] || { txt: o.status, cls: 'tag gray' };
          const canShip = o.status === 'PAID';
          return `
            <tr>
              <td><span class="order-no">${escapeHtml(o.orderNo)}</span></td>
              <td>
                <div style="color:#e74c3c;font-weight:600">${fmtMoney(o.payAmount)}</div>
                <div style="color:var(--text-secondary);font-size:12px">原价 ${fmtMoney(o.totalAmount)}</div>
              </td>
              <td>${o.discountAmount && Number(o.discountAmount) > 0 ? '-' + fmtMoney(o.discountAmount) : '--'}</td>
              <td>${o.payMethod || '--'}</td>
              <td><span class="${st.cls}">${st.txt}</span></td>
              <td style="font-size:12px">${fmtDateTime(o.createTime)}</td>
              <td style="font-size:12px">${fmtDateTime(o.payTime)}</td>
              <td>
                ${canShip
                  ? `<button class="admin-btn primary" onclick="ship('${encodeURIComponent(o.orderNo)}')">发货</button>`
                  : '<span style="color:var(--text-secondary)">--</span>'}
              </td>
            </tr>
          `;
        }).join('');
      }
      renderPagi(result.data.total || 0);
    }

    function renderPagi(total) {
      const totalPage = Math.max(1, Math.ceil(total / PAGE_SIZE));
      const wrap = document.getElementById('pagi');
      const buttons = [];
      buttons.push(`<button onclick="reload(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`);
      buttons.push(`<button class="cur">${currentPage} / ${totalPage}（共 ${total} 单）</button>`);
      buttons.push(`<button onclick="reload(${currentPage + 1})" ${currentPage >= totalPage ? 'disabled' : ''}>下一页</button>`);
      wrap.innerHTML = buttons.join('');
    }

    async function ship(encOrderNo) {
      if (!confirm('确认发货？发货后状态将变为「待收货」。')) return;
      const result = await api(`/api/admin/order/${encOrderNo}/ship`, { method: 'PUT' });
      if (result.code === 200) {
        showToast('已发货');
        reload(currentPage);
      } else {
        showToast(result.msg || '发货失败', 'err');
      }
    }

    (async () => {
      await loadUser();
      await reload();
    })();
  </script>
</body>
</html>
