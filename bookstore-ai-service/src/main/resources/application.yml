server:
  port: 8004

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.128:3306/bookstore_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: YOUR_PASSWORD
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: YOUR_PASSWORD
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YOUR_JWT_SECRET
  access-token-ttl: 2h
  refresh-token-ttl: 7d

bookstore:
  ai:
    enabled: true
    api-base: ${AI_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: YOUR_AI_API_KEY
    model: ${AI_MODEL:qwen-plus}
    search-api-base: https://qianfan.baidubce.com/v2
    search-api-key: YOUR_SEARCH_API_KEY
    search-model: ernie-speed-128k
    recommend-api-base: https://qianfan.baidubce.com/v2
    recommend-api-key: YOUR_RECOMMEND_API_KEY
    recommend-model: ernie-speed-128k
    temperature: 0.7
    max-tokens: 1024
    timeout-seconds: 30
    history-limit: 10

logging:
  level:
    com.bookstore: debug