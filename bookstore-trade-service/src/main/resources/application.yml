server:
  port: 8003

spring:
  application:
    name: trade-service
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.128:3306/bookstore_trade?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: YOUR_PASSWORD
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: YOUR_PASSWORD
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YOUR_JWT_SECRET
  access-token-ttl: 2h
  refresh-token-ttl: 7d

logging:
  level:
    com.bookstore: debug